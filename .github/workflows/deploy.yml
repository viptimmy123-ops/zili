name: Deploy to CloudBase
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 16 }
      - name: Install CloudBase CLI v1
        run: npm i -g @cloudbase/cli@1.11.7
      - name: Login
        run: tcb login --apiKeyId ${{ secrets.TENCENT_SECRET_ID }} --apiKey ${{ secrets.TENCENT_SECRET_KEY }}
      - name: Deploy index.html
        run: tcb hosting deploy index.html index.html -e zili-d6g45h4os6ddf10f0
      - name: Verify
        run: tcb hosting list -e zili-d6g45h4os6ddf10f0 | head -20
